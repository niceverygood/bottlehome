<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>ERP 경영 대시보드 미리보기 — 주식회사 바틀</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  /* dataviz 스킬 기본 검증 팔레트 — 라이트 모드 */
  --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --line:#e1e0d9; --accent:#2a78d6; --accent-dark:#184f95; --accent-soft:#cde2fb;
  --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Pretendard,-apple-system,'Malgun Gothic',sans-serif;background:var(--page);color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:inherit}
/* ---------- loading / error ---------- */
#state{display:flex;min-height:100dvh;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.spin{width:44px;height:44px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--accent);animation:rot 1s linear infinite;margin-bottom:18px}
@keyframes rot{to{transform:rotate(360deg)}}
#state b{font-size:15px;color:var(--ink)}
#state span{font-size:12.5px;color:var(--muted);margin-top:6px}
#state a.retry{display:inline-block;margin-top:16px;background:var(--accent);color:#fff;font-weight:700;font-size:13px;border-radius:10px;padding:10px 18px;text-decoration:none}
/* ---------- app shell ---------- */
#app{display:none}
.app{display:flex;min-height:100dvh}
.side{display:none}
.content{flex:1;min-width:0;padding:16px 16px 48px;max-width:1120px;margin:0 auto;width:100%}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.crumb{font-size:11.5px;color:var(--accent);font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.topbar h1{font-size:20px;font-weight:800;color:var(--ink);margin-top:3px;line-height:1.35}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--line);color:var(--ink2);white-space:nowrap}
.badge.accent{background:var(--accent-soft);border-color:var(--accent-soft);color:var(--accent-dark)}
/* module strip (mobile nav) */
.modstrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.modstrip::-webkit-scrollbar{display:none}
.modchip{flex:none;font-size:12.5px;font-weight:700;padding:9px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--line);color:var(--ink2);white-space:nowrap}
.modchip.active{background:var(--ink);border-color:var(--ink);color:#fff}
/* kpi row */
.kpirow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px}
.kpi span{font-size:11.5px;color:var(--muted);display:block;line-height:1.3}
.kpi b{font-size:19px;color:var(--ink);display:block;margin-top:6px;font-variant-numeric:tabular-nums;word-break:keep-all}
/* grid */
.grid2{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.panel h2{font-size:12px;font-weight:800;color:var(--ink2);letter-spacing:.03em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.panel h2 small{font-weight:600;color:var(--muted);font-size:10.5px}
/* bar chart */
.chartwrap{display:flex;align-items:flex-end;gap:8px;height:150px;padding:0 2px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.barval{font-size:10.5px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;opacity:0;font-variant-numeric:tabular-nums}
.barval.show{opacity:1}
.bar{width:100%;max-width:26px;border-radius:4px 4px 0 0;background:var(--accent-soft)}
.bar.hl{background:var(--accent)}
.barlbl{font-size:10.5px;color:var(--muted);margin-top:7px}
/* alerts */
ul.alerts{list-style:none}
ul.alerts li{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:12.5px;line-height:1.55;color:var(--ink)}
ul.alerts li:last-child{border:0;padding-bottom:0}
.dot{flex:none;width:8px;height:8px;border-radius:50%;margin-top:5px}
.dot.critical{background:var(--critical)}
.dot.warning{background:var(--warning)}
.dot.good{background:var(--good)}
.stag{flex:none;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:6px;white-space:nowrap;margin-top:1px}
.stag.critical{background:rgba(208,59,59,.12);color:var(--critical)}
.stag.warning{background:rgba(250,178,25,.16);color:#8a5a00}
.stag.good{background:rgba(12,163,12,.12);color:var(--good)}
/* footer */
.note{font-size:11.5px;color:var(--muted);line-height:1.7;text-align:center;padding:14px 6px 0}
.backrow{text-align:center;margin-top:18px}
.backrow a{display:inline-block;font-size:12.5px;font-weight:700;color:var(--ink2);text-decoration:none;padding:9px 16px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}
/* desktop */
@media(min-width:860px){
  .side{display:flex;flex-direction:column;width:236px;flex:none;background:var(--surface);border-right:1px solid var(--line);padding:22px 16px;min-height:100dvh}
  .side-brand{margin-bottom:22px}
  .side-brand .tag{font-size:10.5px;font-weight:800;color:var(--accent);letter-spacing:.05em}
  .side-brand b{display:block;font-size:15px;margin-top:5px;color:var(--ink);line-height:1.4}
  .side-nav{display:flex;flex-direction:column;gap:3px}
  .side-nav a{font-size:13px;font-weight:600;color:var(--ink2);padding:10px 12px;border-radius:9px;text-decoration:none}
  .side-nav a.active{background:var(--ink);color:#fff;font-weight:800}
  .side-foot{margin-top:auto;font-size:10.5px;color:var(--muted);padding-top:16px;line-height:1.6}
  .modstrip{display:none}
  .content{padding:28px 32px 60px}
  .kpirow{grid-template-columns:repeat(4,1fr)}
  .grid2{grid-template-columns:1.4fr 1fr}
  .chartwrap{height:180px}
}
</style>
</head>
<body>

<div id="state">
  <div class="spin"></div>
  <b id="stMsg">대시보드를 불러오는 중입니다</b>
  <span id="stSub">잠시만 기다려 주세요</span>
</div>

<div id="app"><div class="app">
  <aside class="side" id="side">
    <div class="side-brand"><span class="tag">AI 설문 기반 미리보기</span><b id="sideBrand"></b></div>
    <nav class="side-nav" id="sideNav"></nav>
    <div class="side-foot">Claude Sonnet 5가 설문 응답을 분석해 구성한 예시 화면입니다.<br>실제 도입 시 메뉴·위젯은 자유롭게 커스터마이즈됩니다.</div>
  </aside>
  <main class="content">
    <div class="modstrip" id="modstrip"></div>
    <header class="topbar">
      <div><div class="crumb" id="crumb"></div><h1 id="pageTitle"></h1></div>
      <div class="badges" id="badges"></div>
    </header>
    <section class="kpirow" id="kpirow"></section>
    <section class="grid2">
      <div class="panel">
        <h2><span id="chartTitle"></span><small>이번 주</small></h2>
        <div class="chartwrap" id="chartwrap"></div>
      </div>
      <div class="panel">
        <h2>주요 알림</h2>
        <ul class="alerts" id="alertlist"></ul>
      </div>
    </section>
    <div class="note">이 화면은 진단 설문 응답을 바탕으로 Claude Sonnet 5가 구성한 예시이며, 실제 지표·메뉴는 도입 상담에서 <span id="companyInline"></span>의 업무에 맞춰 확정됩니다.</div>
    <div class="backrow" id="backrow"></div>
  </main>
</div></div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const API="https://joycuxdxlqhztyomnimh.supabase.co/functions/v1/erp-analyze";
const POLL_MS=3000, POLL_TIMEOUT_MS=60000;

/* ---------- 설문 사전 (index.html과 동일한 기준값) ---------- */
const MODS=[
 {id:"sales",name:"영업·매출",def:"now"},{id:"buy",name:"구매·매입",def:"now"},
 {id:"inv",name:"재고관리",def:"now"},{id:"acc",name:"회계 연동",def:"now"},
 {id:"dash",name:"대시보드·리포트",def:"now"},{id:"auth",name:"권한·보안",def:"now"},
 {id:"hr",name:"인사·근태",def:"later"},{id:"auto",name:"알림·자동화",def:"later"}];
const PRESETS={mfg:{name:"생산관리"},dist:{name:"판매채널 통합"},svc:{name:"예약·회원"},trade:{name:"수출입 관리"}};
const INDNAME={mfg:"제조",dist:"도소매·유통",svc:"서비스",trade:"무역·물류",etc:"기타"};
const EMP=["~10인","10~30인","30~50인","50~100인","100~200인","200인 이상"];

const kpiByInd={mfg:["오늘 생산 진행률","이번 달 매출","자재 부족 품목","불량·반품률"],
  dist:["오늘 주문","채널 합산 매출","출고 대기","재고 회전일"],
  svc:["오늘 예약","이번 달 매출","신규 회원","미정산 금액"],
  trade:["진행 중 오더","이번 달 매출","선적 예정","외화 미수금"],
  etc:["오늘 매출","이번 달 매출","미수금","재고 자산"]};
const kpiVals={mfg:["87%","4.2억","3건","0.8%"],dist:["142건","1.9억","23건","18일"],
  svc:["36건","8,400만","57명","1,240만"],trade:["12건","6.7억","4건","$48K"],etc:["1,850만","3.1억","6,300만","9.4억"]};
const barByInd={mfg:"주간 생산량 추이",dist:"채널별 매출 비중",svc:"요일별 예약 현황",trade:"월별 수출 실적",etc:"월별 매출 추이"};

function buildDash(S,ai){
  const d=ai&&ai.dashboard;
  if(d&&Array.isArray(d.kpis)&&d.kpis.length>=4&&Array.isArray(d.chartValues)&&d.chartValues.length>=3){
    const barValues=d.chartValues.slice(0,6).map(v=>Math.max(6,Math.min(100,Math.round(Number(v))||0)));
    const barLabels=(Array.isArray(d.chartLabels)?d.chartLabels:[]).slice(0,barValues.length);
    while(barLabels.length<barValues.length)barLabels.push("");
    return {kpis:d.kpis.slice(0,4).map(k=>({label:String((k&&k.label)||"").slice(0,12),value:String((k&&k.value)||"-")})),
      barTitle:String(d.chartTitle||"업무 추이").slice(0,16),barLabels,barValues,
      alerts:(Array.isArray(d.alerts)?d.alerts:[]).slice(0,5),aiGenerated:true};
  }
  const ind=(S&&S.industry)||"etc";
  const alerts=[];
  const pains=(S&&S.pains)||[];
  if(pains.includes("재고 불일치"))alerts.push("안전재고 미달 5개 품목 — 자동 발주 제안");
  if(pains.includes("월말 결산 야근"))alerts.push("11월 결산 리포트 자동 생성 완료");
  if(pains.includes("실시간 파악 불가"))alerts.push("실시간 현황 — 방금 전 데이터 기준");
  if(pains.includes("수작업 실수"))alerts.push("중복 입력 2건 자동 감지·병합");
  if(pains.includes("인수인계 리스크"))alerts.push("업무 처리 이력 — 담당자별 기록 조회");
  if((S&&S.integrations||[]).includes("mall"))alerts.push("쇼핑몰 신규 주문 34건 자동 수집");
  if(!alerts.length)alerts.push("오늘의 승인 대기 3건","안전재고 미달 알림 2건");
  return {kpis:kpiByInd[ind].map((k,i)=>({label:k,value:kpiVals[ind][i]})),barTitle:barByInd[ind],
    barLabels:["월","화","수","목","금","오늘"],barValues:[38,55,47,70,62,88],alerts:alerts.slice(0,5),aiGenerated:false};
}

function classify(text){
  if(/실패|오류|사고|초과|불일치|위험|누락/.test(text))return"critical";
  if(/대기|확인|필요|지연|재발|검토|예정/.test(text))return"warning";
  return"good";
}
const STAG={critical:"위험",warning:"주의",good:"정보"};

function setState(msg,sub,showRetry){
  $("stMsg").textContent=msg;$("stSub").textContent=sub||"";
  document.querySelector("#state .spin").style.display=showRetry?"none":"block";
  const old=document.getElementById("retryBtn");if(old)old.remove();
  if(showRetry){const a=document.createElement("a");a.className="retry";a.href=location.href;a.textContent="다시 시도";a.id="retryBtn";$("state").appendChild(a);}
}

function render(S,ai){
  const D=buildDash(S,ai);
  const ind=S.industry||"etc";
  const company=S.company||"고객사";
  $("sideBrand").textContent=company+" ERP";
  $("crumb").textContent=(INDNAME[ind]||"기타")+(S.emp!=null?" · "+(EMP[S.emp]||""):"");
  $("pageTitle").textContent=company+" 경영 현황판";
  $("companyInline").textContent=company;
  document.title=company+" 경영 대시보드 — 주식회사 바틀";

  $("badges").innerHTML=`<span class="badge accent">${D.aiGenerated?"✦ Claude Sonnet 5 생성":"예시 화면"}</span><span class="badge">설문 기반 미리보기</span>`;

  /* 사이드 내비 · 모바일 모듈 스트립 — 1차 오픈(now) 모듈만 */
  const nowMods=MODS.filter(m=>(S.modules||{})[m.id]==="now").map(m=>m.name);
  const preset=PRESETS[ind];
  if(preset&&(S.modules||{}).preset==="now")nowMods.push(preset.name+" (업종 특화)");
  const navItems=["대시보드",...nowMods];
  $("sideNav").innerHTML=navItems.map((n,i)=>`<a class="${i===0?"active":""}">${esc(n)}</a>`).join("");
  $("modstrip").innerHTML=navItems.map((n,i)=>`<span class="modchip${i===0?" active":""}">${esc(n)}</span>`).join("");

  /* KPI */
  $("kpirow").innerHTML=D.kpis.map(k=>`<div class="kpi"><span>${esc(k.label)}</span><b>${esc(k.value)}</b></div>`).join("");

  /* 차트 */
  $("chartTitle").textContent=D.barTitle;
  const n=D.barValues.length;
  $("chartwrap").innerHTML=D.barValues.map((v,i)=>{
    const hl=i===n-1;
    return `<div class="barcol"><span class="barval${hl?" show":""}">${hl?v+"%":""}</span>
      <div class="bar${hl?" hl":""}" style="height:${v}%"></div>
      <span class="barlbl">${esc(D.barLabels[i]||"")}</span></div>`;
  }).join("");

  /* 알림 */
  $("alertlist").innerHTML=D.alerts.map(a=>{
    const sev=classify(a);
    return `<li><span class="dot ${sev}"></span><span style="flex:1">${esc(a)}</span><span class="stag ${sev}">${STAG[sev]}</span></li>`;
  }).join("");

  const leadId=new URLSearchParams(location.search).get("lead");
  $("backrow").innerHTML=leadId?`<a href="../?lead=${encodeURIComponent(leadId)}">← 진단 리포트로 돌아가기</a>`:"";

  $("state").style.display="none";$("app").style.display="block";
}

function poll(id){
  const started=Date.now();
  return new Promise(resolve=>{
    let timer;
    const tick=async()=>{
      let data=null;
      try{const res=await fetch(API+"?public_id="+encodeURIComponent(id));if(res.ok)data=await res.json();}catch(e){}
      if(data&&data.ready){clearInterval(timer);resolve(data.ai||null);return;}
      if(Date.now()-started>POLL_TIMEOUT_MS){clearInterval(timer);resolve(null);}
    };
    timer=setInterval(tick,POLL_MS);tick();
  });
}

(async function init(){
  const id=new URLSearchParams(location.search).get("lead");
  if(!id){setState("리포트 링크가 필요합니다","진단 리포트의 '실제 대시보드 화면으로 보기' 버튼으로 접속해 주세요.",false);return;}
  try{
    const res=await fetch(API+"?public_id="+encodeURIComponent(id)+"&full=1");
    if(!res.ok)throw new Error("http "+res.status);
    const data=await res.json();
    if(!data||!data.answers)throw new Error("no answers");
    let ai=data.ready?(data.ai||null):null;
    if(!data.ready){setState("AI가 대시보드를 구성하는 중입니다","완료 즉시 자동으로 화면이 표시됩니다");ai=await poll(id);}
    render(data.answers,ai);
  }catch(e){
    setState("대시보드를 불러오지 못했습니다","링크가 만료되었거나 잘못되었을 수 있습니다.",true);
  }
})();
</script>
</body>
</html>
