<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>프로젝트 룸 관리자 — 주식회사 바틀</title>
<meta name="theme-color" content="#141414">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--navy:#141414;--navy2:#26262A;--accent:#F54B1E;--mint:#FF6A3D;--gray:#66666C;--light:#F4F1ED;--line:#E4E0DA;--bg:#EFECE7;--blue:#2D63FF}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Pretendard,-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);color:#26262A;-webkit-font-smoothing:antialiased}
button,input,textarea{font-family:inherit}
#login{max-width:380px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:24px}
#login .box{background:#fff;border-radius:14px;padding:28px 26px;box-shadow:0 2px 10px rgba(20,20,20,.07)}
#login .k{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.08em}
#login h1{font-size:18px;color:var(--navy);margin:6px 0 18px}
#login input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:13px 12px;font-size:14px}
#login input:focus{outline:none;border-color:var(--accent)}
#login button{width:100%;margin-top:20px;background:var(--navy);color:#fff;border:0;border-radius:10px;padding:14px;font-size:14px;font-weight:800;cursor:pointer}
#loginerr{color:#D64545;font-size:12.5px;margin-top:10px;display:none}
#app{display:none;height:100dvh;flex-direction:column}
#app.on{display:flex}
.top{background:var(--navy);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex:none}
.top b{font-size:15px}.top .k{color:var(--mint);font-size:10.5px;font-weight:800;letter-spacing:.06em;display:block}
.top a{color:#fff;background:var(--navy2);border-radius:8px;padding:8px 13px;font-size:12px;font-weight:700;text-decoration:none}
.main{flex:1;display:flex;min-height:0}
.list{width:340px;flex:none;border-right:1px solid var(--line);background:#fff;overflow-y:auto;display:flex;flex-direction:column}
.newp{padding:14px;border-bottom:1px solid var(--line)}
.newp input{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:10px 11px;font-size:13px;margin-bottom:7px}
.newp input:focus{outline:none;border-color:var(--blue)}
.newp button{width:100%;background:var(--blue);color:#fff;border:0;border-radius:9px;padding:11px;font-size:13px;font-weight:800;cursor:pointer}
.newp button:disabled{opacity:.5}
.proj{padding:14px;border-bottom:1px solid var(--light);cursor:pointer;position:relative}
.proj:hover,.proj.sel{background:var(--light)}
.proj b{font-size:14px;color:var(--navy);display:block}
.proj .co{font-size:11.5px;color:var(--gray)}
.proj .last{font-size:12px;color:var(--gray);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj .badge{position:absolute;right:14px;top:14px;background:var(--accent);color:#fff;font-size:10.5px;font-weight:800;border-radius:99px;padding:2px 8px}
.proj .pend{position:absolute;right:14px;top:38px;background:var(--blue);color:#fff;font-size:10px;font-weight:800;border-radius:99px;padding:2px 7px}
.room{flex:1;display:flex;flex-direction:column;min-width:0}
.roomtop{padding:13px 16px;border-bottom:1px solid var(--line);background:#fff;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.roomtop b{font-size:14px}
.roomtop .link{font-size:11.5px;color:var(--gray);font-family:ui-monospace,monospace;word-break:break-all}
.roomtop button{background:var(--navy);color:#fff;border:0;border-radius:8px;padding:7px 12px;font-size:11.5px;font-weight:700;cursor:pointer}
#rmsgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:9px}
.m{max-width:78%;padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word;background:#fff;border:1px solid var(--line);align-self:flex-start}
.m.admin{align-self:flex-end;background:var(--navy);color:#fff;border:0}
.m.system{align-self:center;background:none;border:1px dashed var(--line);color:var(--gray);font-size:12px;text-align:center;max-width:92%}
.m.client.feedback{border-color:var(--blue);border-width:1.5px}
.m .who{font-size:10px;font-weight:800;letter-spacing:.05em;color:var(--blue);margin-bottom:4px}
.m .tag{display:inline-block;font-size:9.5px;font-weight:800;background:rgba(45,99,255,.1);color:var(--blue);border-radius:5px;padding:2px 6px;margin-bottom:5px}
.m.pending{border:1.5px solid var(--accent);background:#FFF7F4}
.m .meta a{color:var(--blue);font-size:12px;font-weight:700;text-decoration:none;margin-right:10px}
.m .approve{margin-top:9px;background:var(--accent);color:#fff;border:0;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:800;cursor:pointer}
.compose{flex:none;border-top:1px solid var(--line);background:#fff;padding:11px 14px;display:flex;gap:8px}
.compose textarea{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:13.5px;resize:none;min-height:44px}
.compose textarea:focus{outline:none;border-color:var(--navy)}
.compose button{background:var(--navy);color:#fff;border:0;border-radius:10px;padding:0 18px;font-size:13px;font-weight:800;cursor:pointer}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:13.5px}
@media(max-width:760px){.list{width:100%;display:flex}.list.hide{display:none}.room{display:none}.room.on{display:flex}}
</style>
</head>
<body>
<div id="login">
  <div class="box">
    <span class="k">BOTTLE ADMIN</span>
    <h1>프로젝트 룸 관리자</h1>
    <input type="password" id="tok" placeholder="관리자 토큰" autocomplete="current-password">
    <button id="loginBtn">로그인</button>
    <p id="loginerr">토큰이 올바르지 않습니다.</p>
  </div>
</div>

<div id="app">
  <div class="top">
    <div><span class="k">BOTTLE ADMIN</span><b>프로젝트 룸</b></div>
    <a href="/erpanalysis/admin/">← 리드 관리</a>
  </div>
  <div class="main">
    <div class="list" id="list">
      <div class="newp">
        <input id="npName" placeholder="프로젝트명 (예: OO몰 리뉴얼)" maxlength="80">
        <input id="npCompany" placeholder="클라이언트 회사명" maxlength="80">
        <input id="npRepo" placeholder="GitHub 레포 (owner/name)" maxlength="100">
        <button id="npBtn">+ 프로젝트 룸 만들기</button>
      </div>
      <div id="projs"></div>
    </div>
    <div class="room" id="room">
      <div class="empty" id="roomEmpty">왼쪽에서 프로젝트를 선택하세요</div>
      <div class="roomtop" id="roomTop" style="display:none">
        <div><b id="rName"></b> <span class="link" id="rLink"></span></div>
        <button id="copyBtn">클라이언트 링크 복사</button>
      </div>
      <div id="rmsgs" style="display:none"></div>
      <div class="compose" id="compose" style="display:none">
        <textarea id="rInput" placeholder="클라이언트에게 메시지 보내기" maxlength="4000"></textarea>
        <button id="rSend">전송</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var API = "https://joycuxdxlqhztyomnimh.supabase.co/functions/v1/erp-project";
  var token = localStorage.getItem("erp_admin_token") || "";
  var cur = null, lastId = 0, seen = {}, curToken = "";

  function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
  function hdrs() { return { "content-type": "application/json", "x-admin-token": token }; }

  function show() {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").classList.add("on");
    loadProjects();
    setInterval(function () { loadProjects(); if (cur) loadRoom(false); }, 5000);
  }

  function login() {
    token = document.getElementById("tok").value.trim();
    fetch(API + "?admin=1", { headers: hdrs() }).then(function (r) {
      if (!r.ok) throw 0;
      localStorage.setItem("erp_admin_token", token);
      show();
    }).catch(function () { document.getElementById("loginerr").style.display = "block"; });
  }
  document.getElementById("loginBtn").addEventListener("click", login);
  document.getElementById("tok").addEventListener("keydown", function (e) { if (e.key === "Enter") login(); });

  function loadProjects() {
    return fetch(API + "?admin=1", { headers: hdrs() }).then(function (r) { return r.json(); }).then(function (d) {
      var box = document.getElementById("projs");
      box.innerHTML = "";
      (d.projects || []).forEach(function (p) {
        var el = document.createElement("div");
        el.className = "proj" + (cur === p.id ? " sel" : "");
        el.innerHTML = "<b>" + esc(p.name) + "</b><span class='co'>" + esc(p.client_company || "-") + " · " + esc(p.repo) + "</span>" +
          "<div class='last'>" + esc(p.lastMessage || "") + "</div>" +
          (p.unread ? "<span class='badge'>" + p.unread + "</span>" : "") +
          (p.pending ? "<span class='pend'>승인 " + p.pending + "</span>" : "");
        el.addEventListener("click", function () { openRoom(p); });
        box.appendChild(el);
      });
    }).catch(function () {});
  }

  document.getElementById("npBtn").addEventListener("click", function () {
    var name = document.getElementById("npName").value.trim();
    var company = document.getElementById("npCompany").value.trim();
    var repo = document.getElementById("npRepo").value.trim();
    if (!name || !repo) { alert("프로젝트명과 레포(owner/name)는 필수입니다."); return; }
    this.disabled = true;
    var btn = this;
    fetch(API, { method: "POST", headers: hdrs(), body: JSON.stringify({ action: "create", name: name, company: company, repo: repo }) })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(function (d) {
        document.getElementById("npName").value = document.getElementById("npCompany").value = document.getElementById("npRepo").value = "";
        loadProjects();
        openRoom(d.project);
      })
      .catch(function () { alert("생성 실패 — 레포 형식(owner/name)을 확인하세요."); })
      .then(function () { btn.disabled = false; });
  });

  function openRoom(p) {
    cur = p.id; lastId = 0; seen = {}; curToken = p.client_token;
    document.getElementById("roomEmpty").style.display = "none";
    document.getElementById("roomTop").style.display = "flex";
    document.getElementById("rmsgs").style.display = "flex";
    document.getElementById("compose").style.display = "flex";
    document.getElementById("rmsgs").innerHTML = "";
    document.getElementById("rName").textContent = p.name;
    document.getElementById("rLink").textContent = "bottlecorp.kr/project/?t=" + p.client_token.slice(0, 10) + "…";
    document.getElementById("room").classList.add("on");
    document.getElementById("list").classList.add("hide");
    loadRoom(true);
  }

  document.getElementById("copyBtn").addEventListener("click", function () {
    navigator.clipboard.writeText("https://bottlecorp.kr/project/?t=" + curToken).then(function () { alert("클라이언트 링크가 복사되었습니다."); });
  });

  function renderMsg(m) {
    if (seen[m.id]) return; seen[m.id] = true;
    if (m.id > lastId) lastId = m.id;
    var box = document.getElementById("rmsgs");
    var el = document.createElement("div");
    var pending = m.kind === "bot_reply" && m.meta && m.meta.status === "pending";
    el.className = "m " + m.sender + (m.kind === "feedback" ? " feedback" : "") + (pending ? " pending" : "");
    var html = "";
    if (m.sender === "bot") html += "<div class='who'>BOT" + (pending ? " · 승인 대기" : "") + "</div>";
    if (m.sender === "client") html += "<div class='who' style='color:var(--gray)'>클라이언트</div>";
    if (m.kind === "feedback") html += "<span class='tag'>반영 요청</span><br>";
    html += esc(m.body);
    if (m.meta && (m.meta.pr_url || m.meta.issue_url || m.meta.preview_url)) {
      html += "<div class='meta' style='margin-top:8px'>";
      if (m.meta.preview_url) html += "<a href='" + esc(m.meta.preview_url) + "' target='_blank' rel='noreferrer'>미리보기 ↗</a>";
      if (m.meta.pr_url) html += "<a href='" + esc(m.meta.pr_url) + "' target='_blank' rel='noreferrer'>PR ↗</a>";
      if (m.meta.issue_url) html += "<a href='" + esc(m.meta.issue_url) + "' target='_blank' rel='noreferrer'>이슈 ↗</a>";
      html += "</div>";
    }
    el.innerHTML = html;
    if (pending) {
      var btn = document.createElement("button");
      btn.className = "approve"; btn.textContent = "승인 — 클라이언트에게 회신 발송";
      btn.addEventListener("click", function () {
        btn.disabled = true;
        fetch(API, { method: "POST", headers: hdrs(), body: JSON.stringify({ action: "approve", messageId: m.id }) })
          .then(function (r) { if (!r.ok) throw 0; el.classList.remove("pending"); btn.remove(); loadProjects(); })
          .catch(function () { btn.disabled = false; alert("승인 실패"); });
      });
      el.appendChild(btn);
    }
    box.appendChild(el);
  }

  function loadRoom(first) {
    return fetch(API + "?admin=1&projectId=" + cur + "&after=" + lastId, { headers: hdrs() })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var had = (d.messages || []).length > 0;
        (d.messages || []).forEach(renderMsg);
        if (had || first) { var b = document.getElementById("rmsgs"); b.scrollTop = b.scrollHeight; }
      }).catch(function () {});
  }

  document.getElementById("rSend").addEventListener("click", function () {
    var v = document.getElementById("rInput").value.trim();
    if (!v || !cur) return;
    fetch(API, { method: "POST", headers: hdrs(), body: JSON.stringify({ action: "send", projectId: cur, body: v }) })
      .then(function (r) { if (!r.ok) throw 0; document.getElementById("rInput").value = ""; loadRoom(false); })
      .catch(function () { alert("전송 실패"); });
  });

  if (token) {
    fetch(API + "?admin=1", { headers: hdrs() }).then(function (r) {
      if (r.ok) show(); else document.getElementById("login").style.display = "flex";
    }).catch(function () {});
  }
})();
</script>
</body>
</html>
