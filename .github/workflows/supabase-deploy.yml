# Supabase 백엔드 자동 배포 + 스모크 테스트
#
# 필요한 시크릿 (리포 Settings → Secrets and variables → Actions → New repository secret):
#   SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens 에서 생성한 개인 액세스 토큰
#
# 동작: 스키마 SQL(멱등) 적용 → erp-analyze(Claude Sonnet 5)·erp-chat 배포 →
#       실제 제출→AI 분석→채팅 왕복 스모크 테스트 → 테스트 데이터 삭제.
# 시크릿이 없으면 아무것도 하지 않고 초록색으로 끝난다.
name: Deploy Supabase backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: joycuxdxlqhztyomnimh
    steps:
      - uses: actions/checkout@v4

      - name: 시크릿 확인
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN 시크릿이 없어 배포를 건너뜁니다 — Settings → Secrets and variables → Actions 에 추가하세요"
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: 스키마 적용 (멱등 SQL → Management API)
        if: env.SKIP != 'true'
        run: |
          set -euo pipefail
          for f in supabase/migrations/*.sql; do
            echo "== $f"
            jq -Rs '{query: .}' "$f" | curl -sfS -X POST \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "content-type: application/json" \
              --data @- \
              "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" > /dev/null
          done

      - uses: supabase/setup-cli@v1
        if: env.SKIP != 'true'
        with:
          version: latest

      - name: 함수 배포 (erp-analyze = Claude Sonnet 5, erp-chat)
        if: env.SKIP != 'true'
        run: |
          supabase functions deploy erp-analyze --project-ref "$PROJECT_REF" --no-verify-jwt --use-api
          supabase functions deploy erp-chat    --project-ref "$PROJECT_REF" --no-verify-jwt --use-api

      - name: 스모크 테스트 — 제출 → Sonnet 5 분석 → 채팅 왕복 → 정리
        if: env.SKIP != 'true'
        run: |
          set -euo pipefail
          BASE="https://$PROJECT_REF.supabase.co/functions/v1"

          ID=$(curl -sfS -X POST "$BASE/erp-analyze" -H 'content-type: application/json' -d '{
            "answers":{"company":"[CI 자동테스트]","contact":"010-0000-0000"},
            "rule":{"tier":"STANDARD","lo":1300,"hi":1700,"opt":1550,"pct":88,"olo":0,"ohi":0,"nowCnt":6},
            "aiPayload":{"company":"[CI 자동테스트]","industry":"제조","emp":"10~30인","modulesNow":["영업·매출","재고관리","구매·매입"],"pains":["재고 불일치"],"pricing":{"tier":"STANDARD","band":[1300,1700],"opt":1550,"weeks":"12주 (3개월)"}}
          }' | jq -re .id)
          echo "테스트 리드: $ID"

          for i in $(seq 1 18); do
            sleep 5
            READY=$(curl -sfS "$BASE/erp-analyze?public_id=$ID" | jq -r .ready)
            [ "$READY" = "true" ] && break
          done
          RESULT=$(curl -sfS "$BASE/erp-analyze?public_id=$ID")
          echo "$RESULT" | jq '{ready, ai_ok: (.ai != null), firstLine: (.ai.firstLine // "-")}'
          echo "$RESULT" | jq -e '.ready == true and .ai != null and ((.ai.firstLine // "") | length > 0)' > /dev/null

          curl -sfS -X POST "$BASE/erp-chat" -H 'content-type: application/json' \
            -d "{\"leadId\":\"$ID\",\"sender\":\"customer\",\"body\":\"CI 자동테스트 메시지\"}" | jq -e .ok > /dev/null
          curl -sfS "$BASE/erp-chat?leadId=$ID&after=0" | jq -e '.messages | length >= 1' > /dev/null

          jq -Rs '{query: .}' <<SQL | curl -sfS -X POST -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "content-type: application/json" --data @- "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" > /dev/null
          delete from public.erp_chat_messages where lead_id = '$ID';
          delete from public.erp_chat_reads where lead_id = '$ID';
          delete from public.erp_leads where public_id = '$ID';
          SQL

          echo "✅ 배포 + 스모크 테스트 전부 통과 (Sonnet 5 분석 정상)"
